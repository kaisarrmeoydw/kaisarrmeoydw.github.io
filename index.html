<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>kaisarrmeoydw@root:~$</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,700;1,300&display=swap');

    :root {
      --green: #39ff14;
      --green-dim: #1a7a0a;
      --green-mid: #22cc0a;
      --amber: #ffb300;
      --red: #ff3c3c;
      --bg: #030d01;
      --scan: rgba(57,255,20,0.03);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: default;
    }

    /* CRT scanlines overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        var(--scan) 2px,
        var(--scan) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* CRT vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 9998;
    }

    #screen {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 20px 60px;
      min-height: 100vh;
    }

    /* Title bar */
    #titlebar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--green-dim);
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red   { background: #ff5f57; }
    .dot.yellow{ background: #ffbd2e; }
    .dot.green { background: #28c840; }
    #titlebar span {
      margin-left: 10px;
      font-size: 12px;
      color: var(--green-dim);
      letter-spacing: 2px;
    }

    /* output area */
    #output {
      font-size: 14px;
      line-height: 1.75;
    }

    .line { display: block; min-height: 1.75em; }
    .line.hidden { opacity: 0; }

    .prompt { color: var(--green-dim); }
    .prompt .user { color: var(--green); font-weight: 700; }
    .prompt .at   { color: var(--amber); }
    .prompt .host { color: var(--green-mid); }
    .prompt .path { color: var(--amber); }
    .prompt .sym  { color: var(--green); }

    .cmd  { color: #fff; }
    .key  { color: var(--amber); }
    .val  { color: var(--green); }
    .url  { color: var(--green-mid); text-decoration: underline; cursor: pointer; }
    .url:hover { color: #fff; }
    .dim  { color: var(--green-dim); }
    .hi   { color: #fff; font-weight: 700; }
    .tag  { color: var(--red); }
    .comment { color: var(--green-dim); font-style: italic; }
    .section-title { color: var(--amber); font-weight: 700; letter-spacing: 1px; }

    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 9px;
      height: 1.1em;
      background: var(--green);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
      margin-left: 2px;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Input line at bottom */
    #input-area {
      display: flex;
      align-items: center;
      margin-top: 20px;
      gap: 6px;
    }
    #input-area .prompt { white-space: nowrap; }
    #cmd-input {
      background: transparent;
      border: none;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      flex: 1;
      outline: none;
      caret-color: var(--green);
    }

    /* Glitch on hover for name */
    .glitch {
      position: relative;
      display: inline-block;
    }
    .glitch:hover { animation: glitch-main 0.4s steps(2) 1; }
    @keyframes glitch-main {
      0%   { text-shadow: 2px 0 var(--red), -2px 0 var(--amber); }
      33%  { text-shadow: -2px 0 var(--red), 2px 0 var(--amber); }
      66%  { text-shadow: 2px 0 var(--amber), -2px 0 var(--red); }
      100% { text-shadow: none; }
    }

    /* Progress bar style */
    .bar-track { display: inline-block; color: var(--green-dim); }
    .bar-fill  { display: inline-block; color: var(--green); }

    /* Responsive */
    @media(max-width:600px){
      #screen { padding: 14px 10px 60px; }
      #output { font-size: 12px; }
    }
  </style>
</head>

  `  <span class="key">TG Stars    </span> <span class="dim">::</span>  <a class="url" href="https://t.me/kaisarrmeoydw/2075" target="_blank">t.me/kaisarrmeoydw/2075</a>`,
  ``,
  `<span class="section-title">╚════════════════════════════════════════════════════════════╝</span>`,
  ``,
  `<span class="dim">thanks for knowin' about me. have a nice day.</span>`,
  ``,
  `${promptStr()}<span class="cmd">_</span>`,
];

// ─── typewriter engine ─────────────────────────────────────
let queue = [];
let running = false;

function enqueue(lines, delay = 28) {
  queue.push({ lines, delay });
  if (!running) flush();
}

async function flush() {
  running = true;
  while (queue.length) {
    const { lines, delay } = queue.shift();
    for (const html of lines) {
      await printLine(html, delay);
    }
  }
  running = false;
  inputArea.style.display = 'flex';
  cmdInput.focus();
  scrollBottom();
}

function printLine(html, delay) {
  return new Promise(resolve => {
    const span = document.createElement('div');
    span.classList.add('line');
    span.innerHTML = html;
    out.appendChild(span);
    scrollBottom();
    setTimeout(resolve, delay);
  });
}

function scrollBottom() {
  window.scrollTo(0, document.body.scrollHeight);
}

// ─── commands ─────────────────────────────────────────────
const COMMANDS = {
  help: [
    ``,
    `  <span class="section-title">available commands:</span>`,
    ``,
    `  <span class="key">about</span>     — show full profile`,
    `  <span class="key">social</span>    — list social links`,
    `  <span class="key">donate</span>    — crypto donation addresses`,

  ],

  about: ABOUT_LINES,
  social: [
    ``,

    `  <span class="key">X (real)  </span> <a class="url" href="https://x.com/kaisarrmeoydw" target="_blank">x.com/kaisarrmeoydw</a>`,
    `  <span class="key">Telegram  </span> <a class="url" href="http://kaisarrmeoydw.t.me" target="_blank">kaisarrmeoydw.t.me</a>`,

    `  Cybersec      ${bar(76)}  <span class="dim">76%</span>`,
    `  Meme crafting ${bar(99)}  <span class="dim">99%</span>`,

// ─── input handling ────────────────────────────────────────
cmdInput.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const raw = cmdInput.value.trim();
  cmdInput.value = '';
  if (!raw) return;

  // echo command
  const echo = document.createElement('div');
  echo.classList.add('line');
  echo.innerHTML = promptStr() + `<span class="cmd">${escHtml(raw)}</span>`;
  out.appendChild(echo);

  const cmd = raw.toLowerCase();

  if (cmd === 'clear') {
    out.innerHTML = '';
    return;
  }

  const response = COMMANDS[cmd];
  if (response) {
    enqueue(response, 14);
  } else {
    enqueue([
      ``,
      `  <span class="tag">bash: ${escHtml(raw)}: command not found</span>`,
      `  <span class="dim">type <span class="key">help</span> to see available commands</span>`,
      ``,
    ], 14);
  }
  scrollBottom();
});

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── boot sequence ─────────────────────────────────────────
enqueue(BOOT_LINES, 30);
enqueue(ABOUT_LINES, 12);
</script>
